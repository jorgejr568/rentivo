{% extends "base.html" %}

{% block title %}Criar Conta - Rentivo{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="panel login-panel">
        <div class="panel-body" style="padding: 2rem;">
            <h2 class="login-title">Ren<span>tivo</span></h2>

            {% if error %}
            <div class="toast toast--error" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/signup">
                <div class="field">
                    <label for="email" class="field-label">E-mail</label>
                    <input type="email" class="field-input" id="email" name="email" required autofocus>
                </div>
                <div class="field">
                    <label for="password" class="field-label">Senha</label>
                    <input type="password" class="field-input" id="password" name="password" required>
                </div>
                <div class="field">
                    <label for="confirm_password" class="field-label">Confirmar Senha</label>
                    <input type="password" class="field-input" id="confirm_password" name="confirm_password" required>
                </div>
                {% if turnstile_site_key %}
                <div class="field" style="display: flex; justify-content: center;">
                    <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}" data-theme="light"></div>
                </div>
                {% endif %}
                <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: 0.5rem;">Criar Conta</button>
            </form>
            {% if google_auth_enabled %}
            <div style="display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0;">
                <hr style="flex: 1; border: none; border-top: 1px solid var(--border, #ddd); margin: 0;">
                <span class="muted" style="font-size: 0.85rem;">ou</span>
                <hr style="flex: 1; border: none; border-top: 1px solid var(--border, #ddd); margin: 0;">
            </div>
            <a href="/auth/google/login" class="btn btn--block" data-track="google_login">Continuar com Google</a>
            {% endif %}
            <p style="text-align: center; margin-top: 1rem;">
                Já tem conta? <a href="/login">Entrar</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
