{% extends "base.html" %}
{% block title %}Redefinir senha - Rentivo{% endblock %}
{% block content %}
<div class="login-wrap">
    <div class="panel login-panel">
        <div class="panel-body" style="padding: 2rem;">
            <h2 class="login-title">Ren<span>tivo</span></h2>
            {% if invalid %}
            <div class="toast toast--error" role="alert">
                Link inválido ou expirado. Solicite uma nova redefinição.
            </div>
            <p style="text-align: center; margin-top: 1rem;"><a href="/forgot-password">Pedir novo link</a></p>
            {% else %}
            {% if error %}<div class="toast toast--error" role="alert">{{ error }}</div>{% endif %}
            <form method="post" action="/reset-password">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" name="token" value="{{ token }}">
                <div class="field">
                    <label for="password" class="field-label">Nova senha</label>
                    <input type="password" class="field-input" id="password" name="password" required autofocus>
                </div>
                <div class="field">
                    <label for="confirm_password" class="field-label">Confirmar nova senha</label>
                    <input type="password" class="field-input" id="confirm_password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: 0.5rem;">
                    Redefinir senha
                </button>
            </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
