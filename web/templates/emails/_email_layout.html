<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>{% block title %}Rentivo{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#f5f0e8;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a2e;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f5f0e8;padding:32px 16px;">
    <tr>
        <td align="center">
            <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;">
                <tr>
                    <td style="background:#1a1a2e;border:2.5px solid #1a1a2e;border-bottom:none;padding:18px 28px;">
                        <span style="font-family:'Space Grotesk','Inter',sans-serif;font-weight:700;font-size:24px;letter-spacing:-0.5px;color:#ffffff;">
                            Ren<span style="color:#27ae60;">tivo</span>
                        </span>
                    </td>
                </tr>
                <tr>
                    <td style="background:{% block accent_color %}#27ae60{% endblock %};border-left:2.5px solid #1a1a2e;border-right:2.5px solid #1a1a2e;height:8px;line-height:8px;font-size:0;">&nbsp;</td>
                </tr>
                <tr>
                    <td style="background:#ffffff;border:2.5px solid #1a1a2e;border-top:none;padding:36px 28px;box-shadow:6px 6px 0 #1a1a2e;">
                        {% block content %}{% endblock %}
                    </td>
                </tr>
                <tr>
                    <td style="padding:20px 4px 0;text-align:center;">
                        <p style="margin:0;font-family:'Space Grotesk','Inter',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.5px;text-transform:uppercase;color:#7f8c8d;">
                            Rentivo · Cobranças sem dor de cabeça
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
