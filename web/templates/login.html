{% extends "base.html" %}

{% block title %}Login - Rentivo{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="panel login-panel">
        <div class="panel-body" style="padding: 2rem;">
            <h2 class="login-title">Ren<span>tivo</span></h2>

            {% if error %}
            <div class="toast toast--error" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="field">
                    <label for="email" class="field-label">E-mail</label>
                    <input type="email" class="field-input" id="email" name="email" required autofocus>
                </div>
                <div class="field">
                    <label for="password" class="field-label">Senha</label>
                    <input type="password" class="field-input" id="password" name="password" required>
                </div>
                <p style="text-align: right; margin: 0 0 .75rem; font-size: .875rem;">
                    <a href="/forgot-password">Esqueceu sua senha?</a>
                </p>
                <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: 0.5rem;">Entrar</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">
                Não tem conta? <a href="/signup">Criar conta</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
