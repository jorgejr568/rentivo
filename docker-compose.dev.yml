# Development override: bind-mount the source into the containers and run
# the web server with auto-reload, so you can develop with Docker only.
#
# Usage:
#   make compose-dev        # up with this override
#   make compose-dev-down   # down
#
# Notes:
# - Only ./backend/rentivo and ./backend/legacy_web are mounted (NOT the repo root) so the
#   image's /app/.venv is not shadowed by a host directory.
# - The worker has no auto-reload; after editing job/handler code run:
#   docker compose restart worker
# - With the local email backend, sent emails live INSIDE the worker
#   container (not bind-mounted, to avoid uid-10001 write issues on
#   Linux hosts): docker compose exec worker ls outbox
services:
  rentivo:
    command: uvicorn legacy_web.app:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips=*
    volumes:
      - ./backend/rentivo:/app/backend/rentivo
      - ./backend/legacy_web:/app/backend/legacy_web

  worker:
    volumes:
      - ./backend/rentivo:/app/backend/rentivo
      - ./backend/legacy_web:/app/backend/legacy_web
