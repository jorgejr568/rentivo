name: Setup Python & Dependencies
description: Install uv, provision Python from .python-version, and install the project + all extras from the lockfile.

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Sync dependencies
      shell: bash
      run: uv sync --all-extras --frozen
