name: Docker Build
description: Build or publish one immutable Docker image with BuildKit and GHA cache layers.

inputs:
  dockerfile:
    description: Path to the Dockerfile (relative to repo root).
    required: true
  image-name:
    description: Fully qualified image repository without a tag.
    required: true
  image-tag:
    description: Immutable source commit tag to apply to the image.
    required: true
  cache-scope:
    description: Namespace for the GHA cache so parallel builds of different Dockerfiles don't thrash each other.
    required: true
  push:
    description: Publish the image to its registry after a successful build.
    required: false
    default: "false"
  load:
    description: Load the single-platform image into the local Docker daemon after building it.
    required: false
    default: "false"

outputs:
  digest:
    description: Content digest emitted by BuildKit.
    value: ${{ steps.build.outputs.digest }}
  image-ref:
    description: Immutable repository and digest reference.
    value: ${{ inputs.image-name }}@${{ steps.build.outputs.digest }}

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - id: build
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        load: ${{ inputs.load }}
        tags: ${{ inputs.image-name }}:${{ inputs.image-tag }}
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha,scope=${{ inputs.cache-scope }}
        cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}
