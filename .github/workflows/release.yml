name: Release Tested Production SHA

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Retest exact tagged SHA
    uses: ./.github/workflows/test-pr.yaml
    secrets: inherit

  verify-images:
    name: Verify immutable image provenance
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      attestations: read
      contents: read
      packages: read
    steps:
      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Require exact commit images
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          require_verified_image() {
            local image="$1"
            local image_name="ghcr.io/${GITHUB_REPOSITORY}/${image}"
            local tag_ref="${image_name}:${GITHUB_SHA}"
            local digest digest_ref revision source

            digest="$(docker buildx imagetools inspect "$tag_ref" --format '{{json .Manifest}}' | jq -er '.digest')"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
              echo "${image} tag did not resolve to a valid digest."
              exit 1
            }
            digest_ref="${image_name}@${digest}"
            docker pull "$digest_ref" >/dev/null
            revision="$(docker image inspect "$digest_ref" \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            source="$(docker image inspect "$digest_ref" \
              --format '{{ index .Config.Labels "org.opencontainers.image.source" }}')"
            [ "$revision" = "$GITHUB_SHA" ] || {
              echo "${image} OCI revision does not match the release SHA."
              exit 1
            }
            [ "$source" = "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" ] || {
              echo "${image} OCI source does not match this repository."
              exit 1
            }
            gh attestation verify "oci://$digest_ref" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/deploy.yml" \
              --source-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners >/dev/null
          }

          require_verified_image api
          require_verified_image worker
          require_verified_image frontend

  release:
    runs-on: ubuntu-latest
    needs: [gate, verify-images]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Resolve version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"
      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found = 1; next }
            }
            /^\[.*\]: / {
              if (found) exit
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi
      - name: Verify backend version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pyproject_version="$(grep -E '^version = ' backend/pyproject.toml | head -1 | cut -d'"' -f2)"
          if [ "$pyproject_version" != "$VERSION" ]; then
            echo "::error::backend/pyproject.toml version ($pyproject_version) does not match tag ($VERSION)"
            exit 1
          fi
      - name: Create GitHub Release idempotently
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; skipping create."
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
