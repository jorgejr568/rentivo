name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found = 1; next }
            }
            /^\[.*\]: / {
              if (found) exit
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi

          echo "--- release notes ---"
          cat release-notes.md
          echo "---------------------"

      - name: Verify pyproject.toml version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pyproject_version=$(grep -E '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$pyproject_version" != "$VERSION" ]; then
            echo "::error::pyproject.toml version ($pyproject_version) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — skipping create"
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
