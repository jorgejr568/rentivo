name: Release Tested Production SHA

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Retest exact tagged SHA
    uses: ./.github/workflows/test-pr.yaml
    secrets: inherit

  verify-images:
    name: Verify immutable images exist
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Require exact commit images
        run: |
          docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}/api:${GITHUB_SHA}" >/dev/null
          docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}/worker:${GITHUB_SHA}" >/dev/null
          docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}/frontend:${GITHUB_SHA}" >/dev/null

  release:
    runs-on: ubuntu-latest
    needs: [gate, verify-images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Resolve version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"
      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found = 1; next }
            }
            /^\[.*\]: / {
              if (found) exit
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi
      - name: Verify backend version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pyproject_version="$(grep -E '^version = ' backend/pyproject.toml | head -1 | cut -d'"' -f2)"
          if [ "$pyproject_version" != "$VERSION" ]; then
            echo "::error::backend/pyproject.toml version ($pyproject_version) does not match tag ($VERSION)"
            exit 1
          fi
      - name: Create GitHub Release idempotently
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; skipping create."
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
