name: Protected Production Rollback

"on":
  workflow_dispatch:
    inputs:
      rollback_kind:
        description: Recovery artifact family
        required: true
        type: choice
        options:
          - first-5.0-cutover
          - new-stack
          - new-stack-restore
      target_sha:
        description: Exact source SHA associated with every recovery image
        required: true
        type: string
      expected_alembic_revision:
        description: Alembic revision expected after schema validation or restore
        required: true
        type: string
      database_backup_id:
        description: Verified production backup identifier for restore modes
        required: false
        default: ""
        type: string
      database_backup_sha256:
        description: Verified backup checksum including the sha256 prefix
        required: false
        default: ""
        type: string
      legacy_attestation_source_sha:
        description: Preparation workflow source SHA for first 5.0 cutover legacy image attestations
        required: false
        default: ""
        type: string
      legacy_web_ref:
        description: Legacy web digest for the first 5.0 cutover only
        required: false
        default: ""
        type: string
      legacy_worker_ref:
        description: Legacy worker digest for the first 5.0 cutover only
        required: false
        default: ""
        type: string
      api_ref:
        description: API digest for a new-stack recovery
        required: false
        default: ""
        type: string
      worker_ref:
        description: Worker digest for a new-stack recovery
        required: false
        default: ""
        type: string
      frontend_ref:
        description: Frontend digest for a new-stack recovery
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: rentivo-production
  cancel-in-progress: false

jobs:
  rollback:
    name: Restore verified production artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
    permissions:
      attestations: read
      contents: read
      packages: read
    env:
      API_REF: ${{ inputs.api_ref }}
      DATABASE_BACKUP_ID: ${{ inputs.database_backup_id }}
      DATABASE_BACKUP_SHA256: ${{ inputs.database_backup_sha256 }}
      EXPECTED_ALEMBIC_REVISION: ${{ inputs.expected_alembic_revision }}
      FRONTEND_REF: ${{ inputs.frontend_ref }}
      LEGACY_ATTESTATION_SOURCE_SHA: ${{ inputs.legacy_attestation_source_sha }}
      LEGACY_WEB_REF: ${{ inputs.legacy_web_ref }}
      LEGACY_WORKER_REF: ${{ inputs.legacy_worker_ref }}
      PRODUCTION_ROLLBACK_WEBHOOK_TOKEN: ${{ secrets.PRODUCTION_ROLLBACK_WEBHOOK_TOKEN }}
      PRODUCTION_ROLLBACK_WEBHOOK_URL: ${{ secrets.PRODUCTION_ROLLBACK_WEBHOOK_URL }}
      ROLLBACK_KIND: ${{ inputs.rollback_kind }}
      TARGET_SHA: ${{ inputs.target_sha }}
      WORKER_REF: ${{ inputs.worker_ref }}
    steps:
      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute protected rollback
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_ROLLBACK_WEBHOOK_URL:?Configure the protected rollback webhook URL}"
          : "${PRODUCTION_ROLLBACK_WEBHOOK_TOKEN:?Configure the protected rollback webhook token}"
          python3 - <<'PY'
          import os
          from urllib.parse import urlsplit

          parsed = urlsplit(os.environ["PRODUCTION_ROLLBACK_WEBHOOK_URL"])
          if (
              parsed.scheme != "https"
              or not parsed.hostname
              or parsed.username is not None
              or parsed.password is not None
          ):
              raise SystemExit("Production rollback webhook must be an HTTPS URL without embedded credentials.")
          PY

          [[ "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "Target SHA must be a lowercase 40-character commit SHA."
            exit 1
          }
          [[ "$EXPECTED_ALEMBIC_REVISION" =~ ^[0-9a-f]{12,40}$ ]] || {
            echo "Expected Alembic revision is invalid."
            exit 1
          }

          require_backup() {
            [[ -n "$DATABASE_BACKUP_ID" ]] || {
              echo "Database backup identifier is required for $ROLLBACK_KIND."
              exit 1
            }
            [[ "$DATABASE_BACKUP_SHA256" =~ ^sha256:[0-9a-f]{64}$ ]] || {
              echo "Database backup checksum is invalid for $ROLLBACK_KIND."
              exit 1
            }
          }

          forbid_backup() {
            [[ -z "$DATABASE_BACKUP_ID" && -z "$DATABASE_BACKUP_SHA256" ]] || {
              echo "$ROLLBACK_KIND is image-only and forbids database backup inputs."
              exit 1
            }
          }

          require_legacy_attestation_source() {
            [[ "$LEGACY_ATTESTATION_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
              echo "Legacy attestation workflow source must be a lowercase 40-character commit SHA."
              exit 1
            }
          }

          forbid_legacy_attestation_source() {
            [[ -z "$LEGACY_ATTESTATION_SOURCE_SHA" ]] || {
              echo "$ROLLBACK_KIND does not accept a legacy attestation workflow source SHA."
              exit 1
            }
          }

          require_empty_ref() {
            local name="$1" ref="$2"
            [[ -z "$ref" ]] || {
              echo "$name is not accepted for $ROLLBACK_KIND."
              exit 1
            }
          }

          verify_image() {
            local name="$1" repository="$2" ref="$3" signer_workflow="$4" provenance_sha="$5"
            local expected_repository="ghcr.io/${GITHUB_REPOSITORY}/${repository}"
            local expected_prefix="${expected_repository}@sha256:"
            local digest revision source

            [[ "$ref" == "${expected_prefix}"* ]] || {
              echo "$name must use the exact ${expected_repository} repository and a digest."
              exit 1
            }
            digest="${ref#"$expected_prefix"}"
            [[ "$digest" =~ ^[0-9a-f]{64}$ ]] || {
              echo "$name must be an immutable digest-only reference."
              exit 1
            }
            [[ "$ref" == "${expected_repository}@sha256:${digest}" ]] || {
              echo "$name contains an unexpected tag or suffix."
              exit 1
            }

            docker pull "$ref" >/dev/null
            revision="$(docker image inspect "$ref" \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            source="$(docker image inspect "$ref" \
              --format '{{ index .Config.Labels "org.opencontainers.image.source" }}')"
            [[ "$revision" == "$TARGET_SHA" ]] || {
              echo "$name OCI revision does not match the shared target SHA."
              exit 1
            }
            [[ "$source" == "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" ]] || {
              echo "$name OCI source does not match this repository."
              exit 1
            }
            gh attestation verify "oci://$ref" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/${signer_workflow}" \
              --source-digest "$provenance_sha" \
              --deny-self-hosted-runners >/dev/null
          }

          restore_database=false
          case "$ROLLBACK_KIND" in
            first-5.0-cutover)
              [[ "$EXPECTED_ALEMBIC_REVISION" == "55dc25bae00d" ]] || {
                echo "first-5.0-cutover must restore the pre-5.0 Alembic revision 55dc25bae00d."
                exit 1
              }
              require_backup
              require_legacy_attestation_source
              require_empty_ref api "$API_REF"
              require_empty_ref worker "$WORKER_REF"
              require_empty_ref frontend "$FRONTEND_REF"
              verify_image \
                legacy-web legacy-web "$LEGACY_WEB_REF" \
                .github/workflows/prepare-legacy-rollback.yml "$LEGACY_ATTESTATION_SOURCE_SHA"
              verify_image \
                legacy-worker legacy-worker "$LEGACY_WORKER_REF" \
                .github/workflows/prepare-legacy-rollback.yml "$LEGACY_ATTESTATION_SOURCE_SHA"
              required_stages='["maintenance", "drain", "database_restore", "rollout", "smoke"]'
              restore_database=true
              ;;
            new-stack)
              forbid_backup
              forbid_legacy_attestation_source
              require_empty_ref legacy-web "$LEGACY_WEB_REF"
              require_empty_ref legacy-worker "$LEGACY_WORKER_REF"
              verify_image api api "$API_REF" .github/workflows/deploy.yml "$TARGET_SHA"
              verify_image worker worker "$WORKER_REF" .github/workflows/deploy.yml "$TARGET_SHA"
              verify_image frontend frontend "$FRONTEND_REF" .github/workflows/deploy.yml "$TARGET_SHA"
              required_stages='["maintenance", "drain", "schema_check", "rollout", "smoke"]'
              ;;
            new-stack-restore)
              require_backup
              forbid_legacy_attestation_source
              require_empty_ref legacy-web "$LEGACY_WEB_REF"
              require_empty_ref legacy-worker "$LEGACY_WORKER_REF"
              verify_image api api "$API_REF" .github/workflows/deploy.yml "$TARGET_SHA"
              verify_image worker worker "$WORKER_REF" .github/workflows/deploy.yml "$TARGET_SHA"
              verify_image frontend frontend "$FRONTEND_REF" .github/workflows/deploy.yml "$TARGET_SHA"
              required_stages='["maintenance", "drain", "database_restore", "rollout", "smoke"]'
              restore_database=true
              ;;
            *)
              echo "Unsupported rollback kind."
              exit 1
              ;;
          esac

          normalized_payload_file="$RUNNER_TEMP/rollback-normalized.json"
          payload_file="$RUNNER_TEMP/rollback-request.json"
          response_file="$RUNNER_TEMP/rollback-response.json"

          jq -S -c -n \
            --arg schema_version "rentivo.rollback.v1" \
            --arg rollback_kind "$ROLLBACK_KIND" \
            --arg target_sha "$TARGET_SHA" \
            --arg expected_alembic_revision "$EXPECTED_ALEMBIC_REVISION" \
            --arg database_backup_id "$DATABASE_BACKUP_ID" \
            --arg database_backup_sha256 "$DATABASE_BACKUP_SHA256" \
            --arg legacy_attestation_source_sha "$LEGACY_ATTESTATION_SOURCE_SHA" \
            --arg legacy_web_ref "$LEGACY_WEB_REF" \
            --arg legacy_worker_ref "$LEGACY_WORKER_REF" \
            --arg api_ref "$API_REF" \
            --arg worker_ref "$WORKER_REF" \
            --arg frontend_ref "$FRONTEND_REF" \
            --argjson required_stages "$required_stages" \
            '{
              schema_version: $schema_version,
              environment: "production",
              rollback_kind: $rollback_kind,
              target_sha: $target_sha,
              expected_alembic_revision: $expected_alembic_revision,
              database_backup: (
                if $database_backup_id == "" then null
                else {id: $database_backup_id, sha256: $database_backup_sha256}
                end
              ),
              legacy_attestation_source_sha: (
                if $legacy_attestation_source_sha == "" then null
                else $legacy_attestation_source_sha
                end
              ),
              images: {
                legacy_web: (
                  if $legacy_web_ref == "" then null else {reference: $legacy_web_ref} end
                ),
                legacy_worker: (
                  if $legacy_worker_ref == "" then null else {reference: $legacy_worker_ref} end
                ),
                api: (if $api_ref == "" then null else {reference: $api_ref} end),
                worker: (if $worker_ref == "" then null else {reference: $worker_ref} end),
                frontend: (if $frontend_ref == "" then null else {reference: $frontend_ref} end)
              },
              required_stages: $required_stages
            }' > "$normalized_payload_file"

          payload_hash="$(sha256sum "$normalized_payload_file" | awk '{print $1}')"
          [[ "$payload_hash" =~ ^[0-9a-f]{64}$ ]] || {
            echo "Could not derive the rollback payload hash."
            exit 1
          }
          idempotency_key="rentivo-rollback-${payload_hash}"
          jq --arg idempotency_key "$idempotency_key" \
            '. + {idempotency_key: $idempotency_key}' \
            "$normalized_payload_file" > "$payload_file"

          http_status="$(curl --silent --show-error --fail-with-body \
            --max-time 2400 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header 'Content-Type: application/json' \
            --header 'Accept: application/json' \
            --header "Authorization: Bearer ${PRODUCTION_ROLLBACK_WEBHOOK_TOKEN}" \
            --header "X-Idempotency-Key: ${idempotency_key}" \
            --data-binary "@$payload_file" \
            "$PRODUCTION_ROLLBACK_WEBHOOK_URL")"
          [[ "$http_status" == "200" ]] || {
            echo "Rollback webhook returned HTTP $http_status."
            exit 1
          }

          jq -e \
            --slurpfile request "$payload_file" \
            --arg schema_version "rentivo.rollback.v1" \
            --arg idempotency_key "$idempotency_key" \
            --arg rollback_kind "$ROLLBACK_KIND" \
            --arg target_sha "$TARGET_SHA" \
            --arg expected_alembic_revision "$EXPECTED_ALEMBIC_REVISION" \
            --arg database_backup_id "$DATABASE_BACKUP_ID" \
            --arg database_backup_sha256 "$DATABASE_BACKUP_SHA256" \
            --arg legacy_attestation_source_sha "$LEGACY_ATTESTATION_SOURCE_SHA" \
            --argjson required_stages "$required_stages" \
            --argjson restore_database "$restore_database" \
            'def epoch:
               capture(
                 "^(?<whole>[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2})(?:\\.(?<fraction>[0-9]+))?Z$"
               ) as $timestamp
               | (($timestamp.whole + "Z") | fromdateiso8601)
                 + (if ($timestamp.fraction // "") == "" then 0
                    else ("0." + $timestamp.fraction | tonumber)
                    end);
             def stage_evidence($response; $stage):
               ($response[$stage]) as $evidence
               | $evidence.status == "succeeded"
                 and $evidence.exit_code == 0
                 and ($evidence.log_sha256 | type == "string" and test("^sha256:[0-9a-f]{64}$"))
                 and (($evidence.started_at | epoch) <= ($evidence.completed_at | epoch));
             def stages_are_ordered($response; $stages):
               [$stages[] as $stage | {
                 start: ($response[$stage].started_at | epoch),
                 finish: ($response[$stage].completed_at | epoch)
               }] as $times
               | all(range(0; ($times | length));
                   . as $index | $times[$index].start <= $times[$index].finish)
                 and all(range(1; ($times | length));
                   . as $index | $times[$index - 1].finish <= $times[$index].start);
             ($request[0]) as $expected
             | . as $response
             | .schema_version == $schema_version
               and .idempotency_key == $idempotency_key
               and .environment == "production"
               and .rollback_kind == $rollback_kind
               and .target_sha == $target_sha
               and .expected_alembic_revision == $expected_alembic_revision
               and .status == "succeeded"
               and .rollback_count == 1
               and .stage_order == $required_stages
               and .images == $expected.images
               and .database_backup == $expected.database_backup
               and .legacy_attestation_source_sha == (
                 if $legacy_attestation_source_sha == "" then null
                 else $legacy_attestation_source_sha
                 end
               )
               and all($required_stages[];
                 . as $stage | stage_evidence($response; $stage))
               and stages_are_ordered($response; $required_stages)
               and (
                 if $restore_database then
                   .schema_check == null
                   and .database_restore.revision == $expected_alembic_revision
                   and .database_restore.backup_id == $database_backup_id
                   and .database_restore.backup_sha256 == $database_backup_sha256
                 else
                   .database_restore == null
                   and .schema_check.revision == $expected_alembic_revision
                 end
               )' \
            "$response_file" >/dev/null || {
              echo "Rollback receiver did not prove the exact artifacts and ordered recovery evidence."
              exit 1
            }
          echo "Production receiver restored and verified ${TARGET_SHA}."
