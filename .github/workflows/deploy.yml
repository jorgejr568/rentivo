name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Run tests
        run: uv run --project backend --no-sync pytest -c backend/pyproject.toml -n auto -v --cov --cov-config=backend/pyproject.toml --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Trigger deploy
        env:
          DEPLOY_TRIGGER_URL: ${{ secrets.DEPLOY_TRIGGER_URL }}
        run: |
          overall=0
          # DEPLOY_TRIGGER_URL may hold multiple comma-separated endpoints.
          IFS=',' read -ra urls <<< "$DEPLOY_TRIGGER_URL"
          for raw in "${urls[@]}"; do
            # Trim surrounding whitespace and skip empty entries.
            url="$(echo "$raw" | xargs)"
            [ -z "$url" ] && continue
            success=0
            for i in 1 2 3 4 5; do
              status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
              echo "$url attempt $i: HTTP $status"
              if [ "$status" = "200" ]; then
                echo "Deploy triggered successfully: $url"
                success=1
                break
              fi
              [ "$i" -lt 5 ] && sleep 5
            done
            if [ "$success" -ne 1 ]; then
              echo "Deploy failed after 5 attempts: $url"
              overall=1
            fi
          done
          exit "$overall"
