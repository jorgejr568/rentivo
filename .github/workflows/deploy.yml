name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Run tests
        run: uv run --no-sync python -m pytest tests/ -n auto -v --cov=rentivo --cov=web --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Trigger deploy
        env:
          DEPLOY_TRIGGER_URL: ${{ secrets.DEPLOY_TRIGGER_URL }}
        run: |
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_TRIGGER_URL")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Deploy triggered successfully"
              exit 0
            fi
            [ "$i" -lt 5 ] && sleep 5
          done
          echo "Deploy failed after 5 attempts"
          exit 1
