name: Deploy Tested Production SHA

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: rentivo-production
  cancel-in-progress: false

jobs:
  gate:
    name: Test exact production SHA
    uses: ./.github/workflows/test-pr.yaml
    secrets: inherit

  publish-images:
    name: Publish immutable production images
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      api-digest: ${{ steps.api.outputs.digest }}
      api-ref: ${{ steps.api.outputs.image-ref }}
      frontend-digest: ${{ steps.frontend.outputs.digest }}
      frontend-ref: ${{ steps.frontend.outputs.image-ref }}
      worker-digest: ${{ steps.worker.outputs.digest }}
      worker-ref: ${{ steps.worker.outputs.image-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: api
        name: Publish API image
        uses: ./.github/actions/docker-build
        with:
          dockerfile: backend/Dockerfile.api
          image-name: ghcr.io/${{ github.repository }}/api
          image-tag: ${{ github.sha }}
          cache-scope: production-api
          push: "true"
      - name: Scan API image
        uses: aquasecurity/trivy-action@v0
        with:
          image-ref: ${{ steps.api.outputs.image-ref }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          exit-code: "1"
      - name: Attest API image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ github.repository }}/api
          subject-digest: ${{ steps.api.outputs.digest }}
          push-to-registry: true
      - id: worker
        name: Publish worker image
        uses: ./.github/actions/docker-build
        with:
          dockerfile: backend/Dockerfile.worker
          image-name: ghcr.io/${{ github.repository }}/worker
          image-tag: ${{ github.sha }}
          cache-scope: production-worker
          push: "true"
      - name: Scan worker image
        uses: aquasecurity/trivy-action@v0
        with:
          image-ref: ${{ steps.worker.outputs.image-ref }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          exit-code: "1"
      - name: Attest worker image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ github.repository }}/worker
          subject-digest: ${{ steps.worker.outputs.digest }}
          push-to-registry: true
      - id: frontend
        name: Publish frontend image
        uses: ./.github/actions/docker-build
        with:
          dockerfile: frontend/Dockerfile
          image-name: ghcr.io/${{ github.repository }}/frontend
          image-tag: ${{ github.sha }}
          cache-scope: production-frontend
          push: "true"
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0
        with:
          image-ref: ${{ steps.frontend.outputs.image-ref }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          exit-code: "1"
      - name: Attest frontend image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ github.repository }}/frontend
          subject-digest: ${{ steps.frontend.outputs.digest }}
          push-to-registry: true

  resolve-images:
    name: Resolve and verify immutable production images
    runs-on: ubuntu-latest
    needs: publish-images
    permissions:
      attestations: read
      contents: read
      packages: read
    env:
      PUBLISHED_API_DIGEST: ${{ needs.publish-images.outputs.api-digest }}
      PUBLISHED_API_REF: ${{ needs.publish-images.outputs.api-ref }}
      PUBLISHED_FRONTEND_DIGEST: ${{ needs.publish-images.outputs.frontend-digest }}
      PUBLISHED_FRONTEND_REF: ${{ needs.publish-images.outputs.frontend-ref }}
      PUBLISHED_WORKER_DIGEST: ${{ needs.publish-images.outputs.worker-digest }}
      PUBLISHED_WORKER_REF: ${{ needs.publish-images.outputs.worker-ref }}
    outputs:
      api-digest: ${{ steps.resolve.outputs.api-digest }}
      api-ref: ${{ steps.resolve.outputs.api-ref }}
      frontend-digest: ${{ steps.resolve.outputs.frontend-digest }}
      frontend-ref: ${{ steps.resolve.outputs.frontend-ref }}
      worker-digest: ${{ steps.resolve.outputs.worker-digest }}
      worker-ref: ${{ steps.resolve.outputs.worker-ref }}
    steps:
      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable Docker Buildx
        uses: docker/setup-buildx-action@v3
      - id: resolve
        name: Resolve and verify images
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          resolve_verified_image() {
            local image="$1"
            local published_digest="$2" published_ref="$3"
            local image_name="ghcr.io/${GITHUB_REPOSITORY}/${image}"
            local tag_ref="${image_name}:${GITHUB_SHA}"
            local digest digest_ref revision source

            digest="$(docker buildx imagetools inspect "$tag_ref" --format '{{json .Manifest}}' | jq -er '.digest')"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
              echo "${image} tag did not resolve to a valid digest."
              exit 1
            }
            [ "$digest" = "$published_digest" ] || {
              echo "${image} resolved digest differs from the published build output."
              exit 1
            }
            digest_ref="${image_name}@${digest}"
            [ "$digest_ref" = "$published_ref" ] || {
              echo "${image} digest reference differs from the published build output."
              exit 1
            }
            docker pull "$digest_ref" >/dev/null
            revision="$(docker image inspect "$digest_ref" \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            source="$(docker image inspect "$digest_ref" \
              --format '{{ index .Config.Labels "org.opencontainers.image.source" }}')"
            [ "$revision" = "$GITHUB_SHA" ] || {
              echo "${image} OCI revision does not match the deployment SHA."
              exit 1
            }
            [ "$source" = "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" ] || {
              echo "${image} OCI source does not match this repository."
              exit 1
            }
            gh attestation verify "oci://$digest_ref" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/deploy.yml" \
              --source-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners >/dev/null
            echo "${image}-digest=$digest" >> "$GITHUB_OUTPUT"
            echo "${image}-ref=$digest_ref" >> "$GITHUB_OUTPUT"
          }

          resolve_verified_image api "$PUBLISHED_API_DIGEST" "$PUBLISHED_API_REF"
          resolve_verified_image worker "$PUBLISHED_WORKER_DIGEST" "$PUBLISHED_WORKER_REF"
          resolve_verified_image frontend "$PUBLISHED_FRONTEND_DIGEST" "$PUBLISHED_FRONTEND_REF"

  verify-images:
    name: Verify exact images in the production-shaped stack
    runs-on: ubuntu-latest
    needs: resolve-images
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      API_REF: ${{ needs.resolve-images.outputs.api-ref }}
      FRONTEND_REF: ${{ needs.resolve-images.outputs.frontend-ref }}
      WORKER_REF: ${{ needs.resolve-images.outputs.worker-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Create exact-image stack environment
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          db_password="$(openssl rand -hex 32)"
          db_root_password="$(openssl rand -hex 32)"
          app_secret="$(openssl rand -hex 48)"
          echo "::add-mask::$db_password"
          echo "::add-mask::$db_root_password"
          echo "::add-mask::$app_secret"
          {
            echo "MYSQL_DATABASE=rentivo_exact_images"
            echo "MYSQL_USER=rentivo_exact_images"
            echo "MYSQL_PASSWORD=$db_password"
            echo "MYSQL_ROOT_PASSWORD=$db_root_password"
            echo "RENTIVO_APP_ENV_FILE=$RUNNER_TEMP/rentivo-exact-images-app.env"
            echo "RENTIVO_TRUSTED_TLS_TERMINATOR_CIDR=127.0.0.1/32"
            echo "STACK_OVERRIDE=$RUNNER_TEMP/rentivo-exact-images.override.yml"
            echo "STACK_PROJECT=rentivo-exact-images"
          } >> "$GITHUB_ENV"
          printf '%s\n' \
            "RENTIVO_DB_URL=mysql+pymysql://rentivo_exact_images:${db_password}@db:3306/rentivo_exact_images" \
            "RENTIVO_SECRET_KEY=${app_secret}" \
            'RENTIVO_EMAIL_BACKEND=local' \
            'RENTIVO_EMAIL_LOCAL_PATH=/app/outbox' \
            'RENTIVO_STORAGE_BACKEND=local' \
            'RENTIVO_STORAGE_LOCAL_PATH=/app/invoices' \
            'RENTIVO_ENCRYPTION_BACKEND=base64' \
            'RENTIVO_LOG_JSON=true' \
            > "$RUNNER_TEMP/rentivo-exact-images-app.env"
          cat > "$RUNNER_TEMP/rentivo-exact-images.override.yml" <<'YAML'
          services:
            validate:
              build: null
              image: ${API_REF:?API_REF is required}
              pull_policy: never
              environment:
                RENTIVO_ENVIRONMENT: dev
            migrate:
              build: null
              image: ${API_REF:?API_REF is required}
              pull_policy: never
              environment:
                RENTIVO_ENVIRONMENT: dev
            api:
              build: null
              image: ${API_REF:?API_REF is required}
              pull_policy: never
              environment:
                RENTIVO_ENVIRONMENT: dev
                RENTIVO_PUBLIC_URL: http://127.0.0.1:18080
                RENTIVO_PUBLIC_APP_URL: http://127.0.0.1:18080
                RENTIVO_WEBAUTHN_ORIGIN: http://127.0.0.1:18080
                RENTIVO_WEBAUTHN_RP_ID: 127.0.0.1
                RENTIVO_COOKIE_SECURE: "false"
                RENTIVO_ACCESS_COOKIE_NAME: rentivo_access
                RENTIVO_CHALLENGE_COOKIE_NAME: rentivo_challenge
                RENTIVO_CSRF_COOKIE_NAME: rentivo_csrf
            worker:
              build: null
              image: ${WORKER_REF:?WORKER_REF is required}
              pull_policy: never
              environment:
                RENTIVO_ENVIRONMENT: dev
            frontend:
              build: null
              image: ${FRONTEND_REF:?FRONTEND_REF is required}
              pull_policy: never
          YAML
      - name: Start and verify exact-image stack
        shell: bash
        run: |
          set -euo pipefail
          export RENTIVO_PORT=18080
          docker pull "$API_REF" >/dev/null
          docker pull "$WORKER_REF" >/dev/null
          docker pull "$FRONTEND_REF" >/dev/null
          compose=(docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE")
          "${compose[@]}" up --no-build -d db validate migrate api worker frontend proxy
          validation_id="$("${compose[@]}" ps -aq validate)"
          for attempt in $(seq 1 60); do
            state="$(docker inspect --format '{{.State.Status}}:{{.State.ExitCode}}' "$validation_id")"
            [ "$state" = "exited:0" ] && break
            [[ "$state" != exited:* ]] || { echo "Validation failed with $state."; exit 1; }
            [ "$attempt" -lt 60 ] || { echo "Validation did not finish."; exit 1; }
            sleep 2
          done
          migration_id="$("${compose[@]}" ps -aq migrate)"
          for attempt in $(seq 1 60); do
            state="$(docker inspect --format '{{.State.Status}}:{{.State.ExitCode}}' "$migration_id")"
            [ "$state" = "exited:0" ] && break
            [[ "$state" != exited:* ]] || { echo "Migration failed with $state."; exit 1; }
            [ "$attempt" -lt 60 ] || { echo "Migration did not finish."; exit 1; }
            sleep 2
          done
          for attempt in $(seq 1 90); do
            curl --fail --silent --show-error http://127.0.0.1:18080/api/v1/ready >/dev/null && exit 0
            [ "$attempt" -lt 90 ] || { echo "Exact-image stack never became ready."; exit 1; }
            sleep 2
          done
      - name: Run exact-image shell smoke
        run: ./scripts/smoke-production-stack.sh http://127.0.0.1:18080
      - name: Run exact-image Playwright smoke
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:18080
          PLAYWRIGHT_PRODUCTION_STACK: "1"
        run: npm run e2e -- --project=production-stack
      - name: Capture exact-image stack logs
        if: always()
        shell: bash
        run: |
          if [ -n "${STACK_PROJECT:-}" ] && [ -f "${STACK_OVERRIDE:-}" ]; then
            docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" ps -a || true
            docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" logs --no-color || true
          fi
      - name: Stop exact-image stack
        if: always()
        shell: bash
        run: |
          if [ -n "${STACK_PROJECT:-}" ] && [ -f "${STACK_OVERRIDE:-}" ]; then
            docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" \
              down --volumes --remove-orphans
          fi

  deploy:
    name: Atomic production deployment
    runs-on: ubuntu-latest
    needs: [resolve-images, verify-images]
    permissions:
      contents: read
    timeout-minutes: 35
    environment:
      name: production
    env:
      API_DIGEST: ${{ needs.resolve-images.outputs.api-digest }}
      API_REF: ${{ needs.resolve-images.outputs.api-ref }}
      EXPECTED_ALEMBIC_REVISION: e0f1a2b3c4d5
      FRONTEND_DIGEST: ${{ needs.resolve-images.outputs.frontend-digest }}
      FRONTEND_REF: ${{ needs.resolve-images.outputs.frontend-ref }}
      PRODUCTION_DEPLOY_WEBHOOK_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_TOKEN }}
      PRODUCTION_DEPLOY_WEBHOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_URL }}
      WORKER_DIGEST: ${{ needs.resolve-images.outputs.worker-digest }}
      WORKER_REF: ${{ needs.resolve-images.outputs.worker-ref }}
    steps:
      - name: Deploy tested images once
        shell: bash
        run: |
          set -euo pipefail
          : "${PRODUCTION_DEPLOY_WEBHOOK_URL:?Configure the protected production webhook URL}"
          : "${PRODUCTION_DEPLOY_WEBHOOK_TOKEN:?Configure the protected production webhook token}"
          python3 - <<'PY'
          import os
          from urllib.parse import urlsplit

          parsed = urlsplit(os.environ["PRODUCTION_DEPLOY_WEBHOOK_URL"])
          if (
              parsed.scheme != "https"
              or not parsed.hostname
              or parsed.username is not None
              or parsed.password is not None
          ):
              raise SystemExit("Production deploy webhook must be an HTTPS URL without embedded credentials.")
          PY
          require_digest() {
            local name="$1" ref="$2" digest="$3"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "$name image digest is invalid."; exit 1; }
            [[ "$ref" == *@"$digest" ]] || { echo "$name image reference does not match its digest."; exit 1; }
          }
          require_digest api "$API_REF" "$API_DIGEST"
          require_digest worker "$WORKER_REF" "$WORKER_DIGEST"
          require_digest frontend "$FRONTEND_REF" "$FRONTEND_DIGEST"
          idempotency_key="rentivo-production-${GITHUB_SHA}"
          payload_file="$RUNNER_TEMP/deploy-request.json"
          response_file="$RUNNER_TEMP/deploy-response.json"

          jq -n \
            --arg schema_version "rentivo.deploy.v2" \
            --arg idempotency_key "$idempotency_key" \
            --arg sha "$GITHUB_SHA" \
            --arg expected_alembic_revision "$EXPECTED_ALEMBIC_REVISION" \
            --arg api_ref "$API_REF" \
            --arg api_digest "$API_DIGEST" \
            --arg worker_ref "$WORKER_REF" \
            --arg worker_digest "$WORKER_DIGEST" \
            --arg frontend_ref "$FRONTEND_REF" \
            --arg frontend_digest "$FRONTEND_DIGEST" \
            '{
              schema_version: $schema_version,
              idempotency_key: $idempotency_key,
              environment: "production",
              sha: $sha,
              expected_alembic_revision: $expected_alembic_revision,
              images: {
                api: {reference: $api_ref, digest: $api_digest},
                worker: {reference: $worker_ref, digest: $worker_digest},
                frontend: {reference: $frontend_ref, digest: $frontend_digest}
              },
              required_stages: ["configuration", "production_integrations", "migration", "rollout", "smoke"]
            }' > "$payload_file"

          http_status="$(curl --silent --show-error --fail-with-body \
            --max-time 1800 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header 'Content-Type: application/json' \
            --header 'Accept: application/json' \
            --header "Authorization: Bearer ${PRODUCTION_DEPLOY_WEBHOOK_TOKEN}" \
            --header "X-Idempotency-Key: ${idempotency_key}" \
            --data-binary "@$payload_file" \
            "$PRODUCTION_DEPLOY_WEBHOOK_URL")"
          [ "$http_status" = "200" ] || { echo "Deployment webhook returned HTTP $http_status."; exit 1; }

          jq -e \
            --arg schema_version "rentivo.deploy.v2" \
            --arg idempotency_key "$idempotency_key" \
            --arg sha "$GITHUB_SHA" \
            --arg expected_alembic_revision "$EXPECTED_ALEMBIC_REVISION" \
            --arg api_ref "$API_REF" \
            --arg api_digest "$API_DIGEST" \
            --arg worker_ref "$WORKER_REF" \
            --arg worker_digest "$WORKER_DIGEST" \
            --arg frontend_ref "$FRONTEND_REF" \
            --arg frontend_digest "$FRONTEND_DIGEST" \
            --argjson required_stages '["configuration", "production_integrations", "migration", "rollout", "smoke"]' \
            'def epoch:
               capture("^(?<whole>[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2})(?<fraction>\\.[0-9]+)?Z$")
               | (((.whole + "Z") | fromdateiso8601) + ((.fraction // "0") | tonumber));
             .schema_version == $schema_version
             and .idempotency_key == $idempotency_key
             and .sha == $sha
             and .expected_alembic_revision == $expected_alembic_revision
             and .status == "succeeded"
             and .deployment_count == 1
             and .stage_order == $required_stages
             and .images.api.reference == $api_ref
             and .images.api.digest == $api_digest
             and .images.worker.reference == $worker_ref
             and .images.worker.digest == $worker_digest
             and .images.frontend.reference == $frontend_ref
             and .images.frontend.digest == $frontend_digest
             and .configuration.status == "succeeded"
             and .production_integrations.status == "succeeded"
             and .migration.status == "succeeded"
             and .migration.revision == $expected_alembic_revision
             and .migration.exit_code == 0
             and (.migration.log_sha256 | type == "string" and test("^sha256:[0-9a-f]{64}$"))
             and .rollout.status == "succeeded"
             and .smoke.status == "succeeded"
             and (.configuration.started_at | epoch)
             and (.configuration.completed_at | epoch)
             and (.production_integrations.started_at | epoch)
             and (.production_integrations.completed_at | epoch)
             and (.migration.started_at | epoch)
             and (.migration.completed_at | epoch)
             and (.rollout.started_at | epoch)
             and (.rollout.completed_at | epoch)
             and (.smoke.started_at | epoch)
             and (.smoke.completed_at | epoch)
             and ((.configuration.started_at | epoch) <= (.configuration.completed_at | epoch))
             and ((.configuration.completed_at | epoch) <= (.production_integrations.started_at | epoch))
             and ((.production_integrations.started_at | epoch) <= (.production_integrations.completed_at | epoch))
             and ((.production_integrations.completed_at | epoch) <= (.migration.started_at | epoch))
             and ((.migration.started_at | epoch) <= (.migration.completed_at | epoch))
             and ((.migration.completed_at | epoch) <= (.rollout.started_at | epoch))
             and ((.rollout.started_at | epoch) <= (.rollout.completed_at | epoch))
             and ((.rollout.completed_at | epoch) <= (.smoke.started_at | epoch))
             and ((.smoke.started_at | epoch) <= (.smoke.completed_at | epoch))' \
            "$response_file" >/dev/null || {
              echo "Deployment receiver did not acknowledge the tested SHA and all atomic stages."
              exit 1
            }
          echo "Production receiver atomically deployed and verified ${GITHUB_SHA}."
