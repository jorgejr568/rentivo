                      "created_at": "2026-06-01 09:00:00",
                      "owner_email": "legacy-owner@example.test",
                      "member_email": "legacy-member@example.test",
                      "owner_pix": "legacy-encrypted-pix-key",
                      "merchant_name": "Legacy Rentals",
                      "merchant_city": "SALVADOR",
                      "owner_email_hash": "a" * 64,
