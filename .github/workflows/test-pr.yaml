                       2048, 0, :created_at)
                  """,
                  {
                      "uuid": legacy_uuid(9),
                      "storage_key": "legacy/receipts/payment.pdf",
                      "created_at": "2026-07-05 11:00:00",
                  },
              ),
              (
                  """
                  INSERT INTO expenses
                      (id, uuid, billing_id, description, amount, category,
                       incurred_on, created_at, deleted_at)
                  VALUES
                      (1, :uuid, 1, 'Emergency plumbing', 15750, 'manutencao',
                       '2026-06-28', :created_at, NULL)
                  """,
                  {"uuid": legacy_uuid(10), "created_at": "2026-06-28 16:00:00"},
              ),
              (
                  """
                  INSERT INTO audit_logs
                      (id, uuid, event_type, actor_id, actor_username, source,
                       entity_type, entity_id, entity_uuid, previous_state, new_state,
                       metadata, created_at)
                  VALUES
                      (1, :uuid, 'bill.created', 1, 'legacy-owner@example.test', 'web',
                       'bill', 1, :bill_uuid, NULL, :new_state, :metadata, :created_at)
                  """,
                  {
                      "uuid": legacy_uuid(11),
                      "bill_uuid": legacy_uuid(8),
                      "new_state": '{"status":"issued"}',
                      "metadata": '{"migration_rehearsal":true}',
                      "created_at": "2026-07-01 10:20:00",
                  },
              ),
          ]

          stable_columns = {
              "users": "id, password_hash, created_at, email, pix_key, pix_merchant_name, pix_merchant_city, email_hash",
              # The mfa_totp and passkeys datasets live in legacy user_totp/user_passkeys tables.
              "user_passkeys": "id, uuid, user_id, credential_id, public_key, sign_count, name, transports, created_at, last_used_at",
              "user_totp": "id, user_id, secret, confirmed, created_at, confirmed_at",
              "user_recovery_codes": "id, user_id, code_hash, used_at, created_at",
              "known_devices": "id, user_id, device_hash, user_agent_snippet, first_seen_at, last_seen_at",
              "organizations": "id, uuid, name, created_by, created_at, updated_at, deleted_at, enforce_mfa, pix_key, pix_merchant_name, pix_merchant_city",
              "organization_members": "id, organization_id, user_id, role, created_at",
              "invites": "id, uuid, organization_id, invited_user_id, invited_by_user_id, role, status, created_at, responded_at",
              "billings": "id, name, description, created_at, updated_at, pix_key, uuid, deleted_at, owner_type, owner_id, pix_merchant_name, pix_merchant_city",
              "billing_items": "id, billing_id, description, amount, item_type, sort_order",
              "billing_recipients": "id, uuid, billing_id, name, email, sort_order, created_at",
              "billing_reply_to": "id, uuid, billing_id, name, email, sort_order, created_at",
              "billing_attachments": "id, uuid, billing_id, name, filename, storage_key, content_type, file_size, sort_order, created_at",
              "bills": "id, billing_id, reference_month, total_amount, pdf_path, notes, created_at, uuid, due_date, deleted_at, status, status_updated_at, pdf_render_status, recibo_pdf_path",
              "bill_line_items": "id, bill_id, description, amount, item_type, sort_order",
              "receipts": "id, uuid, bill_id, filename, storage_key, content_type, file_size, sort_order, created_at",
              "expenses": "id, uuid, billing_id, description, amount, category, incurred_on, created_at, deleted_at",
              "audit_logs": "id, uuid, event_type, actor_id, actor_username, source, entity_type, entity_id, entity_uuid, previous_state, new_state, metadata, created_at",
          }

          with get_engine().begin() as connection:
              for statement, parameters in statements:
                  connection.execute(text(statement), parameters)

              tables = {}
              for table, columns in stable_columns.items():
                  rows = [
                      dict(row)
                      for row in connection.execute(
                          text(f"SELECT {columns} FROM {table} ORDER BY id")
                      ).mappings()
                  ]
                  assert rows, f"Representative legacy table {table} is empty"
                  tables[table] = {
                      "columns": columns,
                      "count": len(rows),
                      "rows": rows,
                  }

          snapshot = Path(os.environ["RUNNER_TEMP"]) / "migration-before.json"
          snapshot.write_text(json.dumps({"tables": tables}, default=str, sort_keys=True))
          print(f"Snapshotted {sum(item['count'] for item in tables.values())} legacy rows.")
          PY
      - name: Upgrade the complete production chain to head
        run: uv run --project backend --no-sync alembic -c backend/alembic.ini upgrade head
      - name: Verify the populated production migration
        run: |
          uv run --project backend --no-sync python - <<'PY'
          import json
          import os
          from pathlib import Path

          from sqlalchemy import inspect, text

          from rentivo.db import get_connection

          connection = get_connection()
          snapshot = json.loads(
              (Path(os.environ["RUNNER_TEMP"]) / "migration-before.json").read_text()
          )

          revisions = connection.execute(text("SELECT version_num FROM alembic_version")).scalars().all()
          assert revisions == ["e0f1a2b3c4d5"], revisions

          for table, expected in snapshot["tables"].items():
              actual_rows = [
                  dict(row)
                  for row in connection.execute(
                      text(f"SELECT {expected['columns']} FROM {table} ORDER BY id")
                  ).mappings()
              ]
              actual_rows = json.loads(json.dumps(actual_rows, default=str, sort_keys=True))
              expected_rows = expected["rows"]
              assert len(actual_rows) == expected["count"], (table, len(actual_rows), expected["count"])
              assert actual_rows == expected_rows, (table, actual_rows, expected_rows)

          existing_tables = set(inspect(connection).get_table_names())
          required_auth_tables = {
              "api_keys",
              "api_key_scopes",
              "api_key_resource_grants",
              "auth_challenges",
              "auth_rate_limits",
          }
          assert required_auth_tables <= existing_tables, required_auth_tables - existing_tables

          total, populated, distinct = connection.execute(
              text("SELECT COUNT(*), COUNT(uuid), COUNT(DISTINCT uuid) FROM billing_items")
          ).one()
          expected_total = snapshot["tables"]["billing_items"]["count"]
          assert total == expected_total, (total, expected_total)
          assert total == populated == distinct, (total, populated, distinct)
          print(
              f"Verified {sum(item['count'] for item in snapshot['tables'].values())} "
              f"preserved legacy rows and {total} populated, distinct billing item UUIDs."
          )
          PY
      - name: Report and verify the applied revision
        run: |
          current="$(uv run --project backend --no-sync alembic -c backend/alembic.ini current)"
          printf '%s\n' "$current"
          printf '%s\n' "$current" | grep -F 'e0f1a2b3c4d5 (head)'

  compose-config:
    name: promoted Compose configuration
    runs-on: ubuntu-latest
    env:
      MYSQL_DATABASE: rentivo_compose_ci
      MYSQL_PASSWORD: ci-only-database-password
      MYSQL_ROOT_PASSWORD: ci-only-root-password
      MYSQL_USER: rentivo_compose_ci
      RENTIVO_APP_ENV_FILE: ${{ runner.temp }}/rentivo-compose-app.env
      RENTIVO_PUBLIC_ORIGIN: https://rentivo.example.test
      RENTIVO_TRUSTED_TLS_TERMINATOR_CIDR: 127.0.0.1/32
      RENTIVO_WEBAUTHN_RP_ID: rentivo.example.test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Create disposable application environment
        run: |
          umask 077
          printf '%s\n' \
            'RENTIVO_DB_URL=mysql+pymysql://rentivo_compose_ci:ci-only-database-password@db:3306/rentivo_compose_ci' \
            'RENTIVO_SECRET_KEY=ci-only-compose-secret-key-replace-after-job' \
            'RENTIVO_EMAIL_BACKEND=ses' \
            'RENTIVO_SES_REGION=us-east-1' \
            'RENTIVO_SES_FROM_EMAIL=noreply@rentivo.example.test' \
            'RENTIVO_STORAGE_BACKEND=s3' \
            'RENTIVO_S3_BUCKET=rentivo-compose-ci' \
            'RENTIVO_S3_REGION=us-east-1' \
            'RENTIVO_ENCRYPTION_BACKEND=kms' \
            'RENTIVO_KMS_KEY_ID=alias/rentivo-compose-ci' \
            'RENTIVO_KMS_REGION=us-east-1' \
            'RENTIVO_LOG_JSON=true' \
            > "$RENTIVO_APP_ENV_FILE"
      - name: Validate production Compose
        run: docker compose -f docker-compose.yml config --quiet
      - name: Validate development Compose
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet

  functional-stack:
    name: MariaDB-backed functional stack with CI-only local backends
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MYSQL_DATABASE: rentivo_gate
      MYSQL_USER: rentivo_gate
      RENTIVO_APP_ENV_FILE: ${{ runner.temp }}/rentivo-gate-app.env
      RENTIVO_PUBLIC_ORIGIN: http://127.0.0.1:8080
      RENTIVO_TRUSTED_TLS_TERMINATOR_CIDR: 127.0.0.1/32
      RENTIVO_WEBAUTHN_RP_ID: 127.0.0.1
      STACK_OVERRIDE: ${{ runner.temp }}/rentivo-gate.override.yml
      STACK_PROJECT: rentivo-functional-gate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Create secure disposable stack environment
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          db_password="$(openssl rand -hex 32)"
          db_root_password="$(openssl rand -hex 32)"
          app_secret="$(openssl rand -hex 48)"
          echo "::add-mask::$db_password"
          echo "::add-mask::$db_root_password"
          echo "::add-mask::$app_secret"
          {
            echo "MYSQL_PASSWORD=$db_password"
            echo "MYSQL_ROOT_PASSWORD=$db_root_password"
          } >> "$GITHUB_ENV"
          printf '%s\n' \
            "RENTIVO_DB_URL=mysql+pymysql://rentivo_gate:${db_password}@db:3306/rentivo_gate" \
            "RENTIVO_SECRET_KEY=${app_secret}" \
            'RENTIVO_EMAIL_BACKEND=local' \
            'RENTIVO_EMAIL_LOCAL_PATH=/app/outbox' \
            'RENTIVO_STORAGE_BACKEND=local' \
            'RENTIVO_STORAGE_LOCAL_PATH=/app/invoices' \
            'RENTIVO_ENCRYPTION_BACKEND=base64' \
            'RENTIVO_LOG_JSON=true' \
            > "$RENTIVO_APP_ENV_FILE"
          cat > "$STACK_OVERRIDE" <<'YAML'
          services:
            validate:
              environment:
                RENTIVO_ENVIRONMENT: dev
            migrate:
              environment:
                RENTIVO_ENVIRONMENT: dev
            api:
              environment:
                RENTIVO_ENVIRONMENT: dev
                RENTIVO_PUBLIC_URL: http://127.0.0.1:8080
                RENTIVO_PUBLIC_APP_URL: http://127.0.0.1:8080
                RENTIVO_WEBAUTHN_ORIGIN: http://127.0.0.1:8080
                RENTIVO_WEBAUTHN_RP_ID: 127.0.0.1
                RENTIVO_COOKIE_SECURE: "false"
                RENTIVO_ACCESS_COOKIE_NAME: rentivo_access
                RENTIVO_CHALLENGE_COOKIE_NAME: rentivo_challenge
                RENTIVO_CSRF_COOKIE_NAME: rentivo_csrf
            worker:
              environment:
                RENTIVO_ENVIRONMENT: dev
          YAML
      - name: Start functional stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" up --build -d
          migration_id="$(docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" ps -aq migrate)"
          for attempt in $(seq 1 60); do
            state="$(docker inspect --format '{{.State.Status}}:{{.State.ExitCode}}' "$migration_id")"
            if [ "$state" = "exited:0" ]; then
              break
            fi
            if [[ "$state" == exited:* ]]; then
              echo "Migration failed with $state."
              exit 1
            fi
            [ "$attempt" -lt 60 ] || { echo "Migration did not finish."; exit 1; }
            sleep 2
          done
          for attempt in $(seq 1 90); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/api/v1/ready >/dev/null; then
              exit 0
            fi
            [ "$attempt" -lt 90 ] || { echo "Functional stack never became ready."; exit 1; }
            sleep 2
          done
      - name: Test production smoke parser
        working-directory: frontend
        run: npm run pretest
      - name: Run functional stack smoke
        run: ./scripts/smoke-production-stack.sh http://127.0.0.1:8080
      - name: Run real-stack Playwright project
        working-directory: frontend
        env:
          PLAYWRIGHT_PRODUCTION_STACK: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
        run: npm run e2e -- --project=production-stack
      - name: Capture functional stack logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" ps -a > artifacts/functional-stack-ps.txt
          docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" logs --no-color > artifacts/functional-stack.log
      - name: Upload functional stack evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: functional-stack-results
          path: |
            artifacts/functional-stack-ps.txt
            artifacts/functional-stack.log
            frontend/test-results
          if-no-files-found: warn
          retention-days: 14
      - name: Stop functional stack
        if: always()
        run: docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" down --volumes --remove-orphans

  production-startup:
    name: production settings migration, API, and worker startup
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MYSQL_DATABASE: rentivo_production_ci
      MYSQL_USER: rentivo_production_ci
      RENTIVO_APP_ENV_FILE: ${{ runner.temp }}/rentivo-production-app.env
      RENTIVO_PUBLIC_ORIGIN: https://rentivo.example.test
      RENTIVO_TRUSTED_TLS_TERMINATOR_CIDR: 127.0.0.1/32
      RENTIVO_WEBAUTHN_RP_ID: rentivo.example.test
      STACK_OVERRIDE: ${{ runner.temp }}/rentivo-production.override.yml
      STACK_PROJECT: rentivo-production-startup
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Create secure production startup environment
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          db_password="$(openssl rand -hex 32)"
          db_root_password="$(openssl rand -hex 32)"
          app_secret="$(openssl rand -hex 48)"
          echo "::add-mask::$db_password"
          echo "::add-mask::$db_root_password"
          echo "::add-mask::$app_secret"
          {
            echo "MYSQL_PASSWORD=$db_password"
            echo "MYSQL_ROOT_PASSWORD=$db_root_password"
          } >> "$GITHUB_ENV"
          printf '%s\n' \
            "RENTIVO_DB_URL=mysql+pymysql://rentivo_production_ci:${db_password}@db:3306/rentivo_production_ci" \
            "RENTIVO_SECRET_KEY=${app_secret}" \
            'RENTIVO_ENVIRONMENT=production' \
            'RENTIVO_PUBLIC_URL=https://rentivo.example.test' \
            'RENTIVO_PUBLIC_APP_URL=https://rentivo.example.test' \
            'RENTIVO_WEBAUTHN_ORIGIN=https://rentivo.example.test' \
            'RENTIVO_WEBAUTHN_RP_ID=rentivo.example.test' \
            'RENTIVO_COOKIE_SECURE=true' \
            'RENTIVO_ACCESS_COOKIE_NAME=__Host-rentivo_access' \
            'RENTIVO_CHALLENGE_COOKIE_NAME=__Host-rentivo_challenge' \
            'RENTIVO_CSRF_COOKIE_NAME=__Host-rentivo_csrf' \
            'RENTIVO_EMAIL_BACKEND=ses' \
            'RENTIVO_SES_REGION=us-east-1' \
            'RENTIVO_SES_FROM_EMAIL=noreply@rentivo.example.test' \
            'RENTIVO_SES_ACCESS_KEY_ID=ci-only-ses-access-key' \
            'RENTIVO_SES_SECRET_ACCESS_KEY=ci-only-fake-ses-secret-access-key' \
            'RENTIVO_SES_ENDPOINT_URL=https://ses.example.test' \
            'RENTIVO_STORAGE_BACKEND=s3' \
            'RENTIVO_S3_BUCKET=rentivo-production-ci' \
            'RENTIVO_S3_REGION=us-east-1' \
            'RENTIVO_S3_ACCESS_KEY_ID=ci-only-s3-access-key' \
            'RENTIVO_S3_SECRET_ACCESS_KEY=ci-only-fake-s3-secret-access-key' \
            'RENTIVO_S3_ENDPOINT_URL=https://s3.example.test' \
            'RENTIVO_ENCRYPTION_BACKEND=kms' \
            'RENTIVO_KMS_KEY_ID=alias/rentivo-production-ci' \
            'RENTIVO_KMS_REGION=us-east-1' \
            'RENTIVO_KMS_ACCESS_KEY_ID=ci-only-kms-access-key' \
            'RENTIVO_KMS_SECRET_ACCESS_KEY=ci-only-fake-kms-secret-access-key' \
            'RENTIVO_KMS_ENDPOINT_URL=https://kms.example.test' \
            'RENTIVO_LOG_JSON=true' \
            > "$RENTIVO_APP_ENV_FILE"
          cat > "$STACK_OVERRIDE" <<'YAML'
          services:
            api:
              ports:
                - "127.0.0.1:18000:8000"
          YAML
      - name: Migrate and start production services
        shell: bash
        run: |
          set -euo pipefail
          compose=(docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE")
          "${compose[@]}" up --build -d db validate migrate api worker
          validation_id="$("${compose[@]}" ps -aq validate)"
          for attempt in $(seq 1 60); do
            state="$(docker inspect --format '{{.State.Status}}:{{.State.ExitCode}}' "$validation_id")"
            if [ "$state" = "exited:0" ]; then
              break
            fi
            if [[ "$state" == exited:* ]]; then
              echo "Production validation failed with $state."
              exit 1
            fi
            [ "$attempt" -lt 60 ] || { echo "Production validation did not finish."; exit 1; }
            sleep 2
          done
          migration_id="$("${compose[@]}" ps -aq migrate)"
          for attempt in $(seq 1 60); do
            state="$(docker inspect --format '{{.State.Status}}:{{.State.ExitCode}}' "$migration_id")"
            if [ "$state" = "exited:0" ]; then
              break
            fi
            if [[ "$state" == exited:* ]]; then
              echo "Production migration failed with $state."
              exit 1
            fi
            [ "$attempt" -lt 60 ] || { echo "Production migration did not finish."; exit 1; }
            sleep 2
          done
          for attempt in $(seq 1 90); do
            if curl --fail --silent --show-error http://127.0.0.1:18000/api/v1/ready >/dev/null; then
              break
            fi
            [ "$attempt" -lt 90 ] || { echo "Production API never became ready."; exit 1; }
            sleep 2
          done
          running_services="$("${compose[@]}" ps --status running --services)"
          printf '%s\n' "$running_services" | grep -qx api
          printf '%s\n' "$running_services" | grep -qx worker
      - name: Capture production startup logs
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts
          if [ -f "$STACK_OVERRIDE" ] && [ -n "${MYSQL_PASSWORD:-}" ]; then
            docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" \
              ps -a > artifacts/production-startup-ps.txt || true
            docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" \
              logs --no-color > artifacts/production-startup.log || true
          fi
      - name: Upload production startup evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: production-startup-results
          path: |
            artifacts/production-startup-ps.txt
            artifacts/production-startup.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop production startup services
        if: always()
        shell: bash
        run: |
          if [ -f "$STACK_OVERRIDE" ] && [ -n "${MYSQL_PASSWORD:-}" ]; then
            docker compose -p "$STACK_PROJECT" -f docker-compose.yml -f "$STACK_OVERRIDE" \
              down --volumes --remove-orphans
          fi

  security-scan:
    name: dependency, secret, and configuration security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high
      - name: Install uv for locked SAST
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
      - name: Install locked SAST dependencies
        run: uv sync --project backend --extra dev --frozen
      - name: Run backend static security analysis
        run: uv run --project backend --no-sync bandit -r backend/rentivo -ll -ii
      - name: Export locked backend dependencies
        run: >-
          uv export --project backend --all-extras --frozen --no-hashes --no-emit-project
          --output-file "$RUNNER_TEMP/rentivo-backend-requirements.txt"
      - name: Audit backend dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ runner.temp }}/rentivo-backend-requirements.txt
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          exit-code: "1"
      - name: Scan repository secrets and misconfigurations
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          skip-dirs: .venv
          severity: HIGH,CRITICAL
          ignore-unfixed: "false"
          exit-code: "1"

  release-gate:
    name: complete-release-gate
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e, migrations, compose-config, functional-stack, production-startup, security-scan]
    if: always()
    steps:
      - name: Verify every release gate succeeded
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failures="$(printf '%s' "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result != "success") | "\(.key)=\(.value.result)"')"
          if [ -n "$failures" ]; then
            printf 'Required release gates failed:\n%s\n' "$failures"
            exit 1
          fi

  production-images:
    name: immutable image build (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: release-gate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: backend/Dockerfile.api
            image: ghcr.io/${{ github.repository }}/api
            scope: production-api
          - name: worker
            dockerfile: backend/Dockerfile.worker
            image: ghcr.io/${{ github.repository }}/worker
            scope: production-worker
          - name: frontend
            dockerfile: frontend/Dockerfile
            image: ghcr.io/${{ github.repository }}/frontend
            scope: production-frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/docker-build
        with:
          dockerfile: ${{ matrix.dockerfile }}
          image-name: ${{ matrix.image }}
          image-tag: ${{ github.sha }}
          cache-scope: ${{ matrix.scope }}
          load: "true"
          push: "false"
      - name: Scan immutable image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          exit-code: "1"

  all-checks-pass:
    name: all-checks-pass
    runs-on: ubuntu-latest
    needs: [release-gate, production-images]
    if: always()
    steps:
      - name: Verify release gate and immutable builds succeeded
        env:
          GATE_RESULT: ${{ needs.release-gate.result }}
          IMAGES_RESULT: ${{ needs.production-images.result }}
        run: |
          if [ "$GATE_RESULT" != "success" ] || [ "$IMAGES_RESULT" != "success" ]; then
            echo "release-gate=$GATE_RESULT"
            echo "production-images=$IMAGES_RESULT"
            exit 1
          fi
