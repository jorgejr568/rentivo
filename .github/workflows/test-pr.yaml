                  """,
                  {
                      "created_at": "2026-06-03 10:00:00",
                      "updated_at": "2026-07-01 10:00:00",
                      "pix_key": "legacy-billing-pix-key",
                      "uuid": legacy_uuid(4),
                  },
              ),
              (
                  """
                  INSERT INTO billing_items
                      (id, billing_id, description, amount, item_type, sort_order)
                  VALUES
                      (1, 1, 'Monthly rent', 250000, :fixed, 0),
                      (2, 1, 'Water consumption', 18450, :variable, 1),
                      (3, 1, 'Condominium fee', 62500, :fixed, 2)
                  """,
                  {"fixed": FIXED, "variable": VARIABLE},
              ),
              (
                  """
                  INSERT INTO billing_recipients
                      (id, uuid, billing_id, name, email, sort_order, created_at)
                  VALUES (1, :uuid, 1, 'Legacy Tenant', 'tenant@example.test', 0, :created_at)
                  """,
                  {"uuid": legacy_uuid(5), "created_at": "2026-06-03 10:05:00"},
              ),
              (
                  """
                  INSERT INTO billing_reply_to
                      (id, uuid, billing_id, name, email, sort_order, created_at)
                  VALUES (1, :uuid, 1, 'Legacy Support', 'support@example.test', 0, :created_at)
                  """,
                  {"uuid": legacy_uuid(6), "created_at": "2026-06-03 10:06:00"},
              ),
              (
                  """
                  INSERT INTO billing_attachments
                      (id, uuid, billing_id, name, filename, storage_key, content_type,
                       file_size, sort_order, created_at)
                  VALUES
                      (1, :uuid, 1, 'Building rules', 'rules.pdf', :storage_key,
                       'application/pdf', 4096, 0, :created_at)
                  """,
                  {
                      "uuid": legacy_uuid(7),
                      "storage_key": "legacy/billings/1/rules.pdf",
                      "created_at": "2026-06-03 10:07:00",
                  },
              ),
              (
                  """
                  INSERT INTO bills
                      (id, billing_id, reference_month, total_amount, pdf_path, notes,
                       created_at, uuid, due_date, deleted_at, status, status_updated_at,
