                  VALUES
                      (1, 1, '2026-07', 330950, :pdf_path, 'Legacy issued bill',
                       :created_at, :uuid, '2026-07-10', NULL, 'issued', :status_updated_at,
                       'rendered', :recibo_pdf_path)
                  """,
