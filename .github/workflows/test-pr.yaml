                  """,
                  {
                      "created_at": "2026-06-01 09:12:00",
                      "used_at": "2026-06-15 18:30:00",
                  },
              ),
              (
                  """
                  INSERT INTO known_devices
                      (id, user_id, device_hash, user_agent_snippet, first_seen_at, last_seen_at)
                  VALUES (1, 1, :device_hash, 'Legacy browser', :first_seen_at, :last_seen_at)
                  """,
                  {
                      "device_hash": "c" * 64,
                      "first_seen_at": "2026-06-01 09:15:00",
                      "last_seen_at": "2026-07-01 12:00:00",
                  },
              ),
              (
                  """
                  INSERT INTO organizations
                      (id, uuid, name, created_by, created_at, updated_at, deleted_at,
                       enforce_mfa, pix_key, pix_merchant_name, pix_merchant_city)
                  VALUES
                      (1, :uuid, 'Legacy Property Group', 1, :created_at, :updated_at,
                       NULL, 1, :pix_key, 'Legacy Property Group', 'SALVADOR')
                  """,
                  {
                      "uuid": legacy_uuid(2),
                      "created_at": "2026-06-02 08:00:00",
                      "updated_at": "2026-06-20 14:00:00",
                      "pix_key": "legacy-organization-pix-key",
                  },
              ),
              (
                  """
                  INSERT INTO organization_members
                      (id, organization_id, user_id, role, created_at)
                  VALUES
                      (1, 1, 1, 'owner', :created_at),
                      (2, 1, 2, 'member', :created_at)
                  """,
                  {"created_at": "2026-06-02 08:05:00"},
              ),
              (
                  """
                  INSERT INTO invites
                      (id, uuid, organization_id, invited_user_id, invited_by_user_id,
                       role, status, created_at, responded_at)
                  VALUES
                      (1, :uuid, 1, 2, 1, 'member', 'accepted', :created_at, :responded_at)
                  """,
                  {
                      "uuid": legacy_uuid(3),
                      "created_at": "2026-06-02 08:01:00",
                      "responded_at": "2026-06-02 08:04:00",
                  },
              ),
              (
                  """
                  INSERT INTO billings
                      (id, name, description, created_at, updated_at, pix_key, uuid,
                       deleted_at, owner_type, owner_id, pix_merchant_name, pix_merchant_city)
                  VALUES
                      (1, 'Legacy July Billing', 'Populated production migration rehearsal',
                       :created_at, :updated_at, :pix_key, :uuid, NULL, 'organization', 1,
