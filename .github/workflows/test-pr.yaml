                  },
              ),
              (
                  """
                  INSERT INTO user_passkeys
                      (id, uuid, user_id, credential_id, public_key, sign_count, name,
                       transports, created_at, last_used_at)
                  VALUES
                      (1, :uuid, 1, :credential_id, :public_key, 7, 'Legacy security key',
                       '["internal","usb"]', :created_at, :last_used_at)
                  """,
                  {
                      "uuid": legacy_uuid(1),
                      "credential_id": "legacy-credential-id",
                      "public_key": "legacy-cose-public-key",
                      "created_at": "2026-06-01 09:05:00",
                      "last_used_at": "2026-07-01 12:00:00",
                  },
              ),
              (
                  """
                  INSERT INTO user_totp
                      (id, user_id, secret, confirmed, created_at, confirmed_at)
                  VALUES (1, 1, :secret, 1, :created_at, :confirmed_at)
                  """,
                  {
                      "secret": "legacy-encrypted-totp-secret",
                      "created_at": "2026-06-01 09:10:00",
                      "confirmed_at": "2026-06-01 09:11:00",
