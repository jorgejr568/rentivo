name: Complete Release Gate

on:
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend lint, tests, and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-extras --frozen
      - name: Ruff check
        run: uv run --project backend --no-sync ruff check .
      - name: Ruff format check
        run: uv run --project backend --no-sync ruff format --check .
      - name: Run backend suite with coverage
        run: |
          mkdir -p artifacts
          uv run --project backend --no-sync pytest -c backend/pyproject.toml -n auto -q \
            --cov --cov-config=backend/pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:artifacts/backend-coverage.xml
      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: backend-coverage
          path: artifacts/backend-coverage.xml
          if-no-files-found: warn
          retention-days: 14
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f # v7
        with:
          files: artifacts/backend-coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: frontend OpenAPI, tests, typecheck, lint, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv for API contract generation
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Sync backend dependencies
        working-directory: .
        run: uv sync --all-extras --frozen
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Verify generated API contract is current
        run: npm run api:check
      - name: Run unit tests with coverage
        run: npm run test -- --run --coverage
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Upload frontend coverage and build artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: frontend-results
          path: |
            frontend/coverage
            frontend/dist
          if-no-files-found: warn
          retention-days: 14

  e2e:
    name: mocked frontend E2E, accessibility, and visual parity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        run: npm run e2e
      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: playwright-results
          path: frontend/test-results
          if-no-files-found: ignore
          retention-days: 14

  migrations:
    name: migration single head and clean upgrade
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: rentivo_ci
          MARIADB_ROOT_PASSWORD: ci-only-root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      RENTIVO_DB_URL: mysql+pymysql://root:ci-only-root-password@127.0.0.1:3306/rentivo_ci
      RENTIVO_ENVIRONMENT: dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-extras --frozen
      - name: Require exactly one Alembic head
        run: |
          heads="$(uv run --project backend --no-sync alembic -c backend/alembic.ini heads)"
          printf '%s\n' "$heads"
          count="$(printf '%s\n' "$heads" | grep -c ' (head)$')"
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly one Alembic head; found $count."
            exit 1
          fi
      - name: Verify MariaDB authentication concurrency contracts
        env:
          RENTIVO_TEST_MARIADB_URL: ${{ env.RENTIVO_DB_URL }}
        run: >-
          uv run --project backend --no-sync pytest
          backend/tests/repositories/test_mfa_repos.py
          -k mariadb -q
      - name: Upgrade to the legacy production revision
        run: uv run --project backend --no-sync alembic -c backend/alembic.ini upgrade 55dc25bae00d
      - name: Seed and snapshot representative production data
        run: |
          uv run --project backend --no-sync python - <<'PY'
          import json
          import os
          from pathlib import Path

          from sqlalchemy import text

          from rentivo.db import get_engine

          FIXED = "fixed"
          VARIABLE = "variable"

          def legacy_uuid(sequence: int) -> str:
              return f"01J{sequence:023d}"

          statements = [
