repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        always_run: true

      - id: tests
        name: tests
        entry: uv run python -m pytest -n auto -q
        language: system
        pass_filenames: false
        always_run: true
