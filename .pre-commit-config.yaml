repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --project backend ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: uv run --project backend ruff format --check .
        language: system
        pass_filenames: false
        always_run: true

      - id: tests
        name: tests
        entry: uv run --project backend pytest -c backend/pyproject.toml -n auto -q
        language: system
        pass_filenames: false
        always_run: true
