services:
  db:
    image: mariadb:11
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  rentivo:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the compose network the database host is always the `db`
      # service, regardless of the RENTIVO_DB_URL configured in .env for
      # processes running on the host machine.
      RENTIVO_DB_URL: mysql+pymysql://${MYSQL_USER:-rentivo}:${MYSQL_PASSWORD:-rentivo}@db:3306/${MYSQL_DATABASE:-rentivo}
    ports:
      - "8000:8000"
    volumes:
      - invoices:/app/invoices
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      RENTIVO_DB_URL: mysql+pymysql://${MYSQL_USER:-rentivo}:${MYSQL_PASSWORD:-rentivo}@db:3306/${MYSQL_DATABASE:-rentivo}
    volumes:
      # The pdf.render job writes invoices through the storage backend;
      # with local storage this MUST be the same volume the web app serves.
      - invoices:/app/invoices
    depends_on:
      db:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      # all-in-one exposes an OTLP receiver; the app sends OTLP/HTTP on 4318.
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # web UI
      - "4318:4318"     # OTLP/HTTP
      - "4317:4317"     # OTLP/gRPC

  temporal:
    image: temporalio/auto-setup:1.25.2
    profiles: ["temporal"]
    restart: unless-stopped
    environment:
      DB: sqlite3
    ports:
      - "7233:7233"  # frontend gRPC

  temporal-ui:
    image: temporalio/ui:2.34.0
    profiles: ["temporal"]
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"  # web UI at http://localhost:8233
    depends_on:
      - temporal

volumes:
  mysql-data:
  invoices:
