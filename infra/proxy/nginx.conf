worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    # Docker's embedded DNS updates service addresses after container recreation.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream rentivo_api {
        zone rentivo_api 64k;
        server api:8000 resolve;
    }

    upstream rentivo_frontend {
        zone rentivo_frontend 64k;
        server frontend:8080 resolve;
    }

    # Only the explicitly configured TLS terminator may supply client and TLS
    # forwarding metadata. Local preview trusts no external peer by default.
    set_real_ip_from ${RENTIVO_TRUSTED_TLS_TERMINATOR_CIDR};
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    geo $realip_remote_addr $rentivo_trusted_tls_terminator {
        default 0;
        ${RENTIVO_TRUSTED_TLS_TERMINATOR_CIDR} 1;
    }

    map $http_x_forwarded_proto $rentivo_validated_upstream_proto {
        default $scheme;
        http http;
        https https;
    }

    map $http_x_forwarded_port $rentivo_validated_upstream_port {
        default $server_port;
        "~^[0-9]{1,5}$" $http_x_forwarded_port;
    }

    map $rentivo_trusted_tls_terminator $rentivo_forwarded_proto {
        default $scheme;
        1 $rentivo_validated_upstream_proto;
    }

    map $rentivo_trusted_tls_terminator $rentivo_forwarded_port {
        default $server_port;
        1 $rentivo_validated_upstream_port;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $rentivo_forwarded_port;
        proxy_set_header X-Forwarded-Proto $rentivo_forwarded_proto;
        proxy_set_header X-Request-ID $http_x_request_id;

        error_page 418 = @rentivo_legacy_post;

        location = /api/v1 {
            proxy_pass http://rentivo_api;
        }

        location ^~ /api/v1/ {
            proxy_pass http://rentivo_api;
        }

        location = /health {
            proxy_pass http://rentivo_api;
        }

        location = /robots.txt {
            proxy_pass http://rentivo_api;
        }

        location = /sitemap.xml {
            proxy_pass http://rentivo_api;
        }

        location = /change-password {
            proxy_pass http://rentivo_api;
        }

        location = /security/pix {
            proxy_pass http://rentivo_api;
        }

        location = /auth/google/login {
            proxy_pass http://rentivo_api;
        }

        location ~ ^/billings/[^/]+/bills/[^/]+/(invoice|recibo|receipts/[^/]+)$ {
            proxy_pass http://rentivo_api;
        }

        location ~ ^/billings/[^/]+/attachments/[^/]+$ {
            proxy_pass http://rentivo_api;
        }

        location @rentivo_legacy_post {
            proxy_pass http://rentivo_api;
        }

        location / {
            if ($request_method = POST) {
                return 418;
            }

            limit_except GET HEAD {
                deny all;
            }

            proxy_pass http://rentivo_frontend;
        }
    }
}
